<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Command Centre</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --o:#E8820C;--o2:rgba(232,130,12,0.15);
      --bg:#0A0A0A;--bg2:#111111;--bg3:#181818;--bg4:#202020;
      --red:#E74C3C;--red2:rgba(231,76,60,0.12);--red3:rgba(231,76,60,0.25);
      --green:#2ECC71;--green2:rgba(46,204,113,0.12);
      --yellow:#C8E830;
      --t1:#F0EAE0;--t2:#9A8A78;--t3:#5A4A3A;
      --border:rgba(232,130,12,0.2);--border2:rgba(232,130,12,0.1);
    }
    html,body{min-height:100%;background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px}
    .shell{max-width:1100px;margin:20px auto;background:var(--bg);border-radius:12px;overflow:hidden;border:1px solid var(--border);box-shadow:0 0 60px rgba(232,130,12,0.05)}
    .topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
    .brand{font-size:15px;font-weight:700;letter-spacing:1px;color:var(--o)}
    .brand span{color:var(--t1);font-weight:400}
    .nav{display:flex;align-items:center;gap:1px;background:rgba(255,255,255,0.02);border:1px solid rgba(232,130,12,0.08);border-radius:6px;padding:3px}
    .nb{padding:3px 10px;font-size:9px;border-radius:4px;border:none;background:transparent;color:var(--t3);cursor:pointer;letter-spacing:1.5px;transition:all .2s;text-transform:uppercase;font-weight:400;white-space:nowrap}
    .nb.on{background:var(--o2);color:var(--o)}
    .nb:hover:not(.on){color:var(--t2);background:rgba(232,130,12,0.05)}
    .clock{font-size:12px;color:var(--o);font-variant-numeric:tabular-nums;letter-spacing:.5px}
    .body{padding:20px}
    .view{display:none}.view.on{display:block}
    .scores{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
    .sc{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:12px 14px;position:relative;overflow:hidden}
    .sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--o)}
    .sc-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px}
    .sc-val{font-size:24px;font-weight:300;color:var(--o);line-height:1}
    .sc-sub{font-size:10px;color:var(--t2);margin-top:2px}
    .sc-bar{margin-top:8px;height:2px;background:var(--bg4);border-radius:1px}
    .sc-fill{height:100%;background:var(--o);border-radius:1px;transition:width .4s}
    .alert{background:rgba(231,76,60,0.07);border:1px solid var(--red3);border-radius:7px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
    .adot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;animation:blink 1.5s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .atext{font-size:12px;color:#F08080}
    .three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
    .panel{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:14px}
    .ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .pt{font-size:10px;color:var(--o);text-transform:uppercase;letter-spacing:2px}
    .plink{font-size:11px;color:var(--t2);cursor:pointer;background:none;border:none;padding:0}
    .plink:hover{color:var(--o)}
    .hr{display:flex;align-items:center;gap:8px;padding:8px;margin-bottom:6px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;transition:border-color .15s}
    .hr:last-child{margin-bottom:0}
    .hicon{width:26px;height:26px;border-radius:5px;background:var(--bg4);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
    .hinfo{flex:1;min-width:0;cursor:pointer}
    .hname{font-size:12px;color:var(--t1);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hbar-wrap{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
    .hbar{height:100%;background:var(--o);border-radius:2px;transition:width .3s}
    .hmeta{font-size:10px;color:var(--t2);margin-top:3px}
    .hcheck{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--t3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;transition:all .15s;cursor:pointer}
    .hcheck.done{border-color:var(--green);background:var(--green2);color:var(--green)}
    .hcheck.missed{border-color:var(--red);background:var(--red2);color:var(--red);animation:blink 2s infinite}
    .pr{padding:8px 0;border-bottom:1px solid var(--bg4)}
    .pr:last-child{border-bottom:none}
    .prhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
    .prname{font-size:12px;color:var(--t1)}
    .prpct{font-size:13px;color:var(--o);font-weight:500}
    .prbar-wrap{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:4px}
    .prbar{height:100%;background:var(--o);border-radius:2px}
    .prtags{display:flex;gap:5px;flex-wrap:wrap}
    .tag{font-size:10px;color:var(--t2);background:var(--bg4);padding:2px 6px;border-radius:3px}
    .tdr{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bg4)}
    .tdr:last-child{border-bottom:none}
    .td-check{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--t3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;cursor:pointer;transition:all .15s}
    .td-check.done{border-color:var(--green);background:var(--green2);color:var(--green)}
    .td-text{flex:1;font-size:12px;color:var(--t1)}
    .td-pri{font-size:9px;padding:2px 6px;border-radius:3px;flex-shrink:0}
    .pri-high{background:rgba(231,76,60,0.15);color:#F08080;border:1px solid rgba(231,76,60,0.2)}
    .pri-med{background:rgba(232,130,12,0.12);color:var(--o);border:1px solid var(--border2)}
    .pri-low{background:var(--bg4);color:var(--t3);border:1px solid transparent}
    .missed-section{background:rgba(231,76,60,0.05);border:1px solid var(--red3);border-radius:8px;padding:12px 14px;margin-bottom:14px}
    .ms-title{font-size:10px;color:var(--red);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .st{font-size:10px;color:var(--o);text-transform:uppercase;letter-spacing:2px}
    .add-btn{font-size:11px;color:var(--t2);background:var(--bg3);border:1px solid var(--border2);padding:4px 10px;border-radius:5px;cursor:pointer}
    .add-btn:hover{color:var(--o);border-color:var(--border)}
    .del-btn{width:18px;height:18px;border-radius:3px;border:1px solid transparent;background:transparent;color:var(--t3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;flex-shrink:0;transition:all .15s;line-height:1;padding:0}
    .del-btn:hover{color:var(--red);border-color:rgba(231,76,60,0.3);background:var(--red2)}
    .fhr{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:10px 12px;margin-bottom:8px}
    .fhr:last-child{margin-bottom:0}
    .fhr-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .fhr-name{flex:1;font-size:13px;color:var(--t1)}
    .fhr-streak{font-size:12px;color:var(--o);font-weight:500;white-space:nowrap}
    .fhr-bar-row{display:flex;align-items:center;gap:8px}
    .fhr-bar-wrap{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
    .fhr-bar{height:100%;background:var(--o);border-radius:3px;transition:width .3s}
    .fhr-pb{font-size:10px;color:var(--t2);white-space:nowrap}
    .fhr-meta{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
    .fhr-cat{font-size:10px;color:var(--t3);background:var(--bg4);padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px}
    .freeze{font-size:10px;color:#7BAFD4;background:rgba(123,175,212,0.1);border:1px solid rgba(123,175,212,0.2);padding:2px 7px;border-radius:3px;cursor:pointer}
    .freeze:hover{background:rgba(123,175,212,0.2)}
    .pb-badge{font-size:10px;color:var(--t2);background:var(--bg4);padding:2px 7px;border-radius:3px}
    .stars{display:flex;gap:3px}
    .star{width:16px;height:6px;border-radius:2px;background:var(--bg4);cursor:pointer;transition:background .1s}
    .star.on{background:var(--o)}
    .fcheck{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--t3);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:12px;transition:all .15s}
    .fcheck.done{border-color:var(--green);background:var(--green2);color:var(--green)}
    .fcheck.missed{border-color:var(--red);background:var(--red2);color:var(--red)}
    .row-plus{width:22px;height:22px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--t3);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:14px;transition:all .15s}
    .row-plus:hover{border-color:var(--o);color:var(--o)}
    .heatmap{margin-top:24px}
    .hm-title{font-size:10px;color:var(--o);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
    .hm-cell{width:12px;height:12px;border-radius:2px}
    .proj-tabs{display:flex;gap:1px;background:rgba(255,255,255,0.02);border:1px solid rgba(232,130,12,0.08);border-radius:6px;padding:3px;margin-bottom:16px;width:fit-content}
    .ptb{padding:3px 12px;font-size:9px;border-radius:4px;border:none;background:transparent;color:var(--t3);cursor:pointer;letter-spacing:1.5px;text-transform:uppercase;transition:all .2s}
    .ptb.on{background:var(--o2);color:var(--o)}
    .ptb:hover:not(.on){color:var(--t2)}
    .pcard{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:14px;margin-bottom:10px}
    .pcard:last-child{margin-bottom:0}
    .pcard-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
    .pcard-name{font-size:14px;color:var(--t1);font-weight:500}
    .pcard-pct{font-size:20px;color:var(--o);font-weight:300}
    .pcard-bar-wrap{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:8px}
    .pcard-bar{height:100%;background:var(--o);border-radius:2px;transition:width .3s}
    .pcard-tags{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
    .tasks{border-top:1px solid var(--bg4);padding-top:8px}
    .task{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;color:var(--t2);cursor:pointer}
    .task:hover{color:var(--t1)}
    .tcheck{width:14px;height:14px;border-radius:3px;border:1px solid var(--t3);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;transition:all .15s}
    .tcheck.done{border-color:var(--green);background:var(--green2);color:var(--green)}
    .task.done-task span{text-decoration:line-through;color:var(--t3)}
    .complete-btn{font-size:10px;color:var(--green);background:var(--green2);border:1px solid rgba(46,204,113,0.25);padding:3px 9px;border-radius:4px;cursor:pointer;white-space:nowrap}
    .complete-btn:hover{background:rgba(46,204,113,0.2)}
    .acard{background:var(--bg2);border:1px solid var(--bg4);border-radius:8px;padding:14px;margin-bottom:8px}
    .acard-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .acard-name{font-size:13px;color:var(--green);font-weight:500}
    .acard-date{font-size:10px;color:var(--t3)}
    .acard-tasks{margin-top:8px;border-top:1px solid var(--bg4);padding-top:8px}
    .todo-item{display:flex;align-items:center;gap:10px;padding:9px 12px;margin-bottom:7px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;transition:all .15s}
    .todo-item:hover{border-color:var(--border)}
    .todo-item.done-item{opacity:0.5}
    .todo-item.carried{border-color:rgba(232,130,12,0.3);background:rgba(232,130,12,0.04)}
    .todo-cb{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--t3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;cursor:pointer;transition:all .15s}
    .todo-cb.done{border-color:var(--green);background:var(--green2);color:var(--green)}
    .todo-info{flex:1;min-width:0}
    .todo-name{font-size:13px;color:var(--t1)}
    .todo-name.done{text-decoration:line-through;color:var(--t3)}
    .todo-pri{font-size:9px;padding:2px 7px;border-radius:3px;flex-shrink:0}
    .drag-handle{color:var(--t3);cursor:grab;font-size:14px;padding:0 2px;flex-shrink:0;user-select:none}
    .drag-handle:active{cursor:grabbing}
    .todo-item.dragging{opacity:0.4;border-color:var(--o)}
    .todo-item.drag-over{border-color:var(--o);background:var(--bg4)}
    .add-form{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:16px}
    .add-form-title{font-size:10px;color:var(--o);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
    .add-row{display:flex;gap:8px;flex-wrap:wrap}
    .add-input{flex:1;min-width:160px;background:var(--bg4);border:1px solid var(--border2);border-radius:5px;padding:7px 10px;font-size:12px;color:var(--t1);outline:none}
    .add-input:focus{border-color:var(--o)}
    .add-input::placeholder{color:var(--t3)}
    .add-select{background:var(--bg4);border:1px solid var(--border2);border-radius:5px;padding:7px 10px;font-size:12px;color:var(--t2);outline:none;cursor:pointer}
    .add-submit{background:var(--o2);border:1px solid var(--o);border-radius:5px;padding:7px 14px;font-size:11px;color:var(--o);cursor:pointer;white-space:nowrap}
    .add-submit:hover{background:rgba(232,130,12,0.25)}
    .filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
    .filter-btn{font-size:10px;padding:3px 10px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--t3);cursor:pointer;letter-spacing:.5px;text-transform:uppercase}
    .filter-btn.on{background:var(--o2);border-color:var(--o);color:var(--o)}
    /* carried over section */
    .carried-section{background:rgba(232,130,12,0.04);border:1px solid rgba(232,130,12,0.2);border-radius:8px;padding:12px 14px;margin-bottom:16px}
    .carried-title{font-size:10px;color:var(--o);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
    .carried-sub{font-size:10px;color:var(--t3);font-weight:400;text-transform:none;letter-spacing:0}
    /* todo archive panel */
    .todo-archive-panel{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:16px;margin-bottom:16px}
    .tap-title{font-size:10px;color:var(--o);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
    .tap-close{font-size:11px;color:var(--t2);cursor:pointer;text-transform:none;letter-spacing:0}
    .tap-close:hover{color:var(--o)}
    .day-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;transition:background .15s;margin-bottom:4px}
    .day-row:hover{background:var(--bg3)}
    .day-row.open{background:var(--bg3);border-radius:6px 6px 0 0;margin-bottom:0}
    .day-date{font-size:12px;color:var(--t1);flex:1}
    .day-score{font-size:11px;color:var(--t2);margin-right:4px}
    .day-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .day-tasks{background:var(--bg3);border-radius:0 0 6px 6px;padding:8px 10px 10px;margin-bottom:4px}
    .day-task-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;color:var(--t2);border-bottom:1px solid var(--bg4)}
    .day-task-row:last-child{border-bottom:none}
    .day-task-cb{width:14px;height:14px;border-radius:3px;border:1px solid var(--t3);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
    .day-task-cb.done{border-color:var(--green);background:var(--green2);color:var(--green)}
    .day-task-cb.undone{border-color:var(--red);background:var(--red2);color:var(--red)}
    .chevron{font-size:10px;color:var(--t3);transition:transform .2s}
    .chevron.open{transform:rotate(90deg)}
    /* modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:100}
    .modal{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:24px;max-width:320px;width:90%;text-align:center}
    .modal-title{font-size:14px;color:var(--t1);font-weight:500;margin-bottom:8px}
    .modal-body{font-size:12px;color:var(--t2);margin-bottom:20px;line-height:1.6}
    .modal-actions{display:flex;gap:10px;justify-content:center}
    .modal-cancel{padding:7px 18px;font-size:12px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--t2);cursor:pointer}
    .modal-cancel:hover{color:var(--t1)}
    .modal-ok{padding:7px 18px;font-size:12px;border-radius:5px;border:1px solid rgba(46,204,113,0.3);background:var(--green2);color:var(--green);cursor:pointer}
    .modal-ok.red{border-color:rgba(231,76,60,0.3);background:var(--red2);color:var(--red)}
    @media(max-width:700px){.scores{grid-template-columns:repeat(2,1fr)}.three{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="brand">COMMAND <span>CENTRE</span></div>
    <div class="nav">
      <button class="nb on" onclick="nav('overview')">Overview</button>
      <button class="nb" onclick="nav('habits')">Daily Habits</button>
      <button class="nb" onclick="nav('projects')">Projects</button>
      <button class="nb" onclick="nav('todo')">To-Do</button>
    </div>
    <div class="clock" id="clk"></div>
  </div>
  <div class="body">

    <!-- OVERVIEW -->
    <div id="v-overview" class="view on">
      <div class="scores" id="scores"></div>
      <div class="alert" id="alert-bar" style="display:none"><div class="adot"></div><div class="atext" id="alert-text"></div></div>
      <div class="three">
        <div class="panel"><div class="ph"><div class="pt">Today's habits</div><button class="plink" onclick="nav('habits')">View all →</button></div><div id="ov-habits"></div></div>
        <div class="panel"><div class="ph"><div class="pt">Active projects</div><button class="plink" onclick="nav('projects')">View all →</button></div><div id="ov-projects"></div></div>
        <div class="panel"><div class="ph"><div class="pt">To-Do</div><button class="plink" onclick="nav('todo')">View all →</button></div><div id="ov-todo"></div></div>
      </div>
    </div>

    <!-- HABITS -->
    <div id="v-habits" class="view">
      <div id="missed-section" style="display:none" class="missed-section"><div class="ms-title"><div class="adot"></div>Needs attention today</div><div id="missed-list"></div></div>
      <div class="sh"><div class="st">Daily habits</div><button class="add-btn" onclick="alert('Add habit — coming soon!')">+ Add habit</button></div>
      <div id="full-habits"></div>
      <div class="heatmap"><div class="hm-title">12-week consistency map</div><div id="heatmap"></div></div>
    </div>

    <!-- PROJECTS -->
    <div id="v-projects" class="view">
      <div class="sh"><div class="st">Projects</div><button class="add-btn" id="new-proj-btn" onclick="alert('Add project — coming soon!')">+ New project</button></div>
      <div class="proj-tabs">
        <button class="ptb on" onclick="setProjTab('active',this)">Active</button>
        <button class="ptb" onclick="setProjTab('archive',this)">Archive</button>
      </div>
      <div id="proj-active"></div>
      <div id="proj-archive" style="display:none"></div>
    </div>

    <!-- TO-DO -->
    <div id="v-todo" class="view">
      <!-- Archive panel (hidden by default) -->
      <div class="todo-archive-panel" id="todo-archive-panel" style="display:none">
        <div class="tap-title">
          To-Do Archive
          <span class="tap-close" onclick="toggleTodoArchive()">✕ Close</span>
        </div>
        <div id="todo-archive-days"></div>
      </div>

      <!-- Carried over section -->
      <div class="carried-section" id="carried-section" style="display:none">
        <div class="carried-title">
          Carried over from yesterday
          <span class="carried-sub">These weren't finished — do them today or delete them</span>
        </div>
        <div id="carried-list"></div>
      </div>

      <div class="add-form" id="todo-form" style="display:none">
        <div class="add-form-title">New To-Do</div>
        <div class="add-row">
          <input class="add-input" id="todo-input" placeholder="What needs to be done?" />
          <select class="add-select" id="todo-pri"><option value="high">🔴 High</option><option value="med" selected>🟠 Medium</option><option value="low">⚪ Low</option></select>
          <button class="add-submit" onclick="submitTodo()">Add</button>
        </div>
      </div>

      <div class="sh">
        <div class="st">To-Do List</div>
        <div style="display:flex;gap:8px">
          <button class="add-btn" onclick="toggleTodoArchive()">📅 Archive</button>
          <button class="add-btn" onclick="toggleForm()">+ Add to-do</button>
        </div>
      </div>
      <div class="filters">
        <button class="filter-btn on" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('high',this)">🔴 High</button>
        <button class="filter-btn" onclick="setFilter('med',this)">🟠 Medium</button>
        <button class="filter-btn" onclick="setFilter('low',this)">⚪ Low</button>
        <button class="filter-btn" onclick="setFilter('done',this)">✓ Done</button>
      </div>
      <div id="full-todo"></div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-title" id="m-title"></div>
    <div class="modal-body" id="m-body"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-ok" id="m-ok">Confirm</button>
    </div>
  </div>
</div>

<script>
const O='#E8820C',GREEN='#2ECC71',YELLOW='#C8E830';
function hmColor(s){if(s===0)return '#181818';if(s<0.25)return '#2A1A04';if(s<0.5)return O;if(s<0.75)return YELLOW;return GREEN;}

const habits=[
  {name:'Meditation',icon:'🧘',cat:'MIND',type:'binary',streak:12,pb:21,status:'done',rating:0,freezes:2},
  {name:'Gym',icon:'💪',cat:'BODY',type:'binary',streak:7,pb:14,status:'done',rating:0,freezes:1},
  {name:'Stretching',icon:'🤸',cat:'BODY',type:'binary',streak:3,pb:8,status:'missed',rating:0,freezes:0},
  {name:'Thought patterns',icon:'🧠',cat:'MIND',type:'scale',streak:5,pb:9,status:'done',rating:4,freezes:1},
  {name:'Daily mantras',icon:'✨',cat:'FOCUS',type:'binary',streak:0,pb:6,status:'missed',rating:0,freezes:0},
  {name:'Eating',icon:'🥗',cat:'BODY',type:'scale',streak:9,pb:15,status:'done',rating:3,freezes:0},
  {name:'Sleep',icon:'😴',cat:'SLEEP',type:'scale',streak:6,pb:11,status:'pending',rating:0,freezes:0},
];

const projects=[
  {name:'Launch this dashboard',pct:35,due:'Jun 2026',tags:['Product','Design'],tasks:['Define architecture','Build in Lovable','Test with real data','Share with friends'],done:[true,false,false,false],archived:false,archivedDate:null},
  {name:'Read 12 books this year',pct:58,due:'Dec 2026',tags:['Learning'],tasks:['Finish current book','Write summary notes','Pick next book'],done:[true,true,false],archived:false,archivedDate:null},
  {name:'Morning routine overhaul',pct:80,due:'Jun 2026',tags:['Health'],tasks:['Lock in wake time','Add cold shower','Review after 30 days'],done:[true,true,false],archived:false,archivedDate:null},
];

// todos — carried:true means carried over from yesterday
const todos=[
  {text:'Buy groceries for the week',pri:'high',done:false,rank:0,carried:false},
  {text:'Reply to emails',pri:'high',done:false,rank:1,carried:false},
  {text:'Book dentist appointment',pri:'med',done:false,rank:2,carried:false},
  {text:'Read 30 pages',pri:'med',done:true,rank:3,carried:false},
  {text:'Call mum',pri:'med',done:false,rank:4,carried:false},
  {text:'Tidy desk',pri:'low',done:false,rank:5,carried:false},
  // demo: two carried-over items from yesterday
  {text:'Send invoice to client',pri:'high',done:false,rank:6,carried:true},
  {text:'Book flights for June',pri:'med',done:false,rank:7,carried:true},
];

// demo archive data — last 7 days
function buildArchive(){
  const days=[];
  const today=new Date();
  const samples=[
    [{text:'Morning run',done:true},{text:'Read emails',done:true},{text:'Call dentist',done:false},{text:'Grocery shopping',done:true}],
    [{text:'Prepare presentation',done:true},{text:'Team standup notes',done:true},{text:'Book hotel',done:false}],
    [{text:'Gym session',done:true},{text:'Reply to John',done:true},{text:'Pay bills',done:true},{text:'Oil change',done:false}],
    [{text:'Meditation 20min',done:true},{text:'Read 30 pages',done:false},{text:'Write journal',done:true}],
    [{text:'Grocery shopping',done:true},{text:'Call mum',done:true},{text:'Fix CV',done:false},{text:'Laundry',done:true}],
    [{text:'Morning stretch',done:false},{text:'Send invoice',done:true},{text:'Book flights',done:false}],
    [{text:'Deep work session',done:true},{text:'Review budget',done:true},{text:'Cook meal prep',done:true},{text:'Walk outside',done:true}],
  ];
  for(let i=1;i<=7;i++){
    const d=new Date(today);d.setDate(today.getDate()-i);
    const tasks=samples[(i-1)%samples.length];
    const doneCount=tasks.filter(t=>t.done).length;
    days.push({date:d,label:d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}),tasks,doneCount,total:tasks.length});
  }
  return days;
}
const archiveDays=buildArchive();
let openArchiveDay=null;

let activeFilter='all',projTabView='active',dragSrcIdx=null,todoArchiveOpen=false;

function showModal(title,body,okLabel,isRed,onOk){
  document.getElementById('m-title').textContent=title;
  document.getElementById('m-body').textContent=body;
  const btn=document.getElementById('m-ok');
  btn.textContent=okLabel;btn.className='modal-ok'+(isRed?' red':'');
  btn.onclick=()=>{closeModal();onOk();};
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';}

function priLabel(p){
  if(p==='high')return '<span class="td-pri pri-high">High</span>';
  if(p==='med')return '<span class="td-pri pri-med">Med</span>';
  return '<span class="td-pri pri-low">Low</span>';
}
function todayScore(){return Math.round(habits.filter(h=>h.status==='done').length/habits.length*100)}
function weekScore(){return Math.round(todayScore()*0.9+5)}
function monthScore(){return Math.round(todayScore()*0.85+8)}
function quarterScore(){return Math.round(todayScore()*0.78+6)}

function renderScores(){
  const s=[
    {label:'Today',val:todayScore(),sub:habits.filter(h=>h.status==='done').length+'/'+habits.length+' habits'},
    {label:'This week',val:weekScore(),sub:'Avg daily · 7d'},
    {label:'This month',val:monthScore(),sub:'Avg daily · 30d'},
    {label:'This quarter',val:quarterScore(),sub:'Avg daily · 90d'},
  ];
  document.getElementById('scores').innerHTML=s.map(s=>`<div class="sc"><div class="sc-label">${s.label}</div><div class="sc-val">${s.val}<span style="font-size:13px;color:var(--t3)">%</span></div><div class="sc-sub">${s.sub}</div><div class="sc-bar"><div class="sc-fill" style="width:${s.val}%"></div></div></div>`).join('');
}
function renderAlert(){
  const missed=habits.filter(h=>h.status==='missed');
  const el=document.getElementById('alert-bar');
  if(!missed.length){el.style.display='none';return;}
  el.style.display='flex';
  document.getElementById('alert-text').textContent=missed.length+' habit'+(missed.length>1?'s':'')+' incomplete today — '+missed.map(h=>h.name).join(' · ');
}
function renderOvHabits(){
  document.getElementById('ov-habits').innerHTML=habits.slice(0,3).map((h,i)=>`
    <div class="hr"><div class="hicon">${h.icon}</div>
    <div class="hinfo" onclick="toggleH(${i})"><div class="hname">${h.name}</div>
    <div class="hbar-wrap"><div class="hbar" style="width:${Math.round(h.streak/Math.max(h.pb,1)*100)}%"></div></div>
    <div class="hmeta">${h.streak>0?'🔥 '+h.streak+'d':'No streak'}</div></div>
    <div class="hcheck ${h.status}" onclick="toggleH(${i})">${h.status==='done'?'✓':h.status==='missed'?'!':''}</div></div>`).join('');
}
function renderOvProjects(){
  const active=projects.filter(p=>!p.archived);
  document.getElementById('ov-projects').innerHTML=active.slice(0,3).map(p=>`
    <div class="pr"><div class="prhead"><div class="prname">${p.name}</div><div class="prpct">${p.pct}%</div></div>
    <div class="prbar-wrap"><div class="prbar" style="width:${p.pct}%"></div></div>
    <div class="prtags">${p.tags.map(t=>`<div class="tag">${t}</div>`).join('')}</div></div>`).join('');
}
function renderOvTodo(){
  const pending=todos.filter(t=>!t.done&&!t.carried).slice(0,3);
  document.getElementById('ov-todo').innerHTML=pending.length===0
    ?`<div style="font-size:12px;color:var(--t3);text-align:center;padding:16px 0">All clear! ✓</div>`
    :pending.map(t=>{const i=todos.indexOf(t);return`<div class="tdr"><div class="td-check" onclick="toggleTodo(${i})"></div><div class="td-text">${t.text}</div>${priLabel(t.pri)}</div>`;}).join('');
}
function renderMissed(){
  const missed=habits.filter(h=>h.status==='missed');
  const sec=document.getElementById('missed-section');
  if(!missed.length){sec.style.display='none';return;}
  sec.style.display='block';
  document.getElementById('missed-list').innerHTML=missed.map(h=>{
    const i=habits.indexOf(h);
    return`<div class="hr" style="border-color:rgba(231,76,60,0.3);margin-bottom:6px"><div class="hicon">${h.icon}</div><div class="hinfo" onclick="toggleH(${i})"><div class="hname" style="color:#F08080">${h.name}</div><div class="hmeta" style="color:#A06060">Tap to mark complete</div></div><div class="hcheck missed" onclick="toggleH(${i})">!</div></div>`;
  }).join('');
}
function renderFullHabits(){
  document.getElementById('full-habits').innerHTML=habits.map((h,i)=>{
    const pct=Math.round(h.streak/Math.max(h.pb,1)*100);
    const stars=h.type==='scale'?`<div class="stars">${[1,2,3,4,5].map(s=>`<div class="star ${h.rating>=s?'on':''}" onclick="setRating(${i},${s});event.stopPropagation()"></div>`).join('')}</div>`:'';
    return`<div class="fhr"><div class="fhr-top"><div style="font-size:18px">${h.icon}</div><div class="fhr-name">${h.name}</div>${stars}<div class="fhr-streak">${h.streak>0?'🔥'+h.streak:''}</div><div class="fcheck ${h.status}" onclick="toggleH(${i})">${h.status==='done'?'✓':h.status==='missed'?'!':''}</div><button class="row-plus">+</button><button class="del-btn" onclick="deleteHabit(${i})">✕</button></div><div class="fhr-bar-row"><div class="fhr-bar-wrap"><div class="fhr-bar" style="width:${pct}%"></div></div><div class="fhr-pb">PB ${h.pb}d</div></div><div class="fhr-meta"><div class="fhr-cat">${h.cat}</div>${h.freezes>0?`<div class="freeze" onclick="useFreeze(${i});event.stopPropagation()">❄ ${h.freezes} freeze${h.freezes>1?'s':''}</div>`:''}<div class="pb-badge">${pct}% of PB</div></div></div>`;
  }).join('');
}
function renderHeatmap(){
  const weeks=12,days=7,today=new Date();
  const dayLabels=['M','T','W','T','F','S','S'];
  const dayCol=dayLabels.map(l=>`<div style="height:12px;display:flex;align-items:center;font-size:9px;color:var(--t3);width:12px;justify-content:center">${l}</div>`).join('');
  let cols='';
  for(let w=weeks-1;w>=0;w--){
    let cells='';
    for(let d=0;d<days;d++){
      const date=new Date(today);date.setDate(today.getDate()-((w*7)+(days-1-d)));
      const isFuture=date>today;const score=isFuture?0:Math.random();
      cells+=`<div class="hm-cell" style="background:${isFuture?'#131313':hmColor(score)}" title="${isFuture?'Future':date.toDateString()+': '+Math.round(score*100)+'%'}"></div>`;
    }
    cols+=`<div style="display:flex;flex-direction:column;gap:3px">${cells}</div>`;
  }
  document.getElementById('heatmap').innerHTML=`<div style="display:flex;gap:3px"><div style="display:flex;flex-direction:column;gap:3px;margin-right:4px">${dayCol}</div><div style="display:flex;gap:3px">${cols}</div></div><div style="display:flex;align-items:center;gap:6px;margin-top:12px"><span style="font-size:10px;color:var(--t3)">Nothing</span><div style="width:10px;height:10px;border-radius:2px;background:#181818"></div><div style="width:10px;height:10px;border-radius:2px;background:${O}"></div><span style="font-size:10px;color:var(--t2)">Partial</span><div style="width:10px;height:10px;border-radius:2px;background:${YELLOW}"></div><span style="font-size:10px;color:var(--t2)">50/50</span><div style="width:10px;height:10px;border-radius:2px;background:${GREEN}"></div><span style="font-size:10px;color:var(--t2)">Perfect</span></div>`;
}
function renderProjects(){
  const active=projects.filter(p=>!p.archived);
  const archived=projects.filter(p=>p.archived);
  document.getElementById('proj-active').innerHTML=active.length===0
    ?`<div style="font-size:12px;color:var(--t3);text-align:center;padding:20px 0">No active projects — add one!</div>`
    :active.map(p=>{const pi=projects.indexOf(p);return`<div class="pcard"><div class="pcard-head"><div><div class="pcard-name">${p.name}</div></div><div style="display:flex;align-items:center;gap:8px"><div class="pcard-pct">${p.pct}%</div><button class="del-btn" onclick="deleteProject(${pi})">✕</button></div></div><div class="pcard-tags">${p.tags.map(t=>`<div class="tag">${t}</div>`).join('')}<div class="tag">${p.due}</div></div><div class="pcard-bar-wrap"><div class="pcard-bar" style="width:${p.pct}%"></div></div><div class="tasks">${p.tasks.map((t,ti)=>`<div class="task ${p.done[ti]?'done-task':''}" onclick="toggleTask(${pi},${ti})"><div class="tcheck ${p.done[ti]?'done':''}">${p.done[ti]?'✓':''}</div><span>${t}</span></div>`).join('')}<div style="margin-top:10px;display:flex;gap:8px"><button class="add-btn">+ Add task</button><button class="complete-btn" onclick="confirmComplete(${pi})">✓ Mark complete</button></div></div></div>`;}).join('');
  document.getElementById('proj-archive').innerHTML=archived.length===0
    ?`<div style="font-size:12px;color:var(--t3);text-align:center;padding:20px 0">No archived projects yet.</div>`
    :archived.map(p=>{const pi=projects.indexOf(p);return`<div class="acard"><div class="acard-head"><div class="acard-name">✓ ${p.name}</div><div style="display:flex;align-items:center;gap:8px"><div class="acard-date">Completed ${p.archivedDate}</div><button class="del-btn" onclick="deleteProject(${pi})">✕</button></div></div><div class="prtags" style="margin-top:4px">${p.tags.map(t=>`<div class="tag">${t}</div>`).join('')}</div><div class="acard-tasks">${p.tasks.map(t=>`<div class="task done-task"><div class="tcheck done">✓</div><span>${t}</span></div>`).join('')}</div></div>`;}).join('');
}

function renderCarried(){
  const carried=todos.filter(t=>t.carried&&!t.done);
  const sec=document.getElementById('carried-section');
  if(!carried.length){sec.style.display='none';return;}
  sec.style.display='block';
  document.getElementById('carried-list').innerHTML=carried.map(t=>{
    const i=todos.indexOf(t);
    return`<div class="todo-item carried">
      <div class="todo-cb ${t.done?'done':''}" onclick="toggleTodo(${i})">${t.done?'✓':''}</div>
      <div class="todo-info"><div class="todo-name">${t.text}</div><div style="font-size:10px;color:var(--t3);margin-top:2px">From yesterday</div></div>
      ${priLabel(t.pri)}
      <button class="del-btn" onclick="deleteTodo(${i})">✕</button>
    </div>`;
  }).join('');
}

function renderFullTodo(){
  let list=todos.filter(t=>!t.carried).slice().sort((a,b)=>a.rank-b.rank);
  if(activeFilter==='done') list=todos.slice().filter(t=>t.done).sort((a,b)=>a.rank-b.rank);
  else if(activeFilter!=='all') list=list.filter(t=>t.pri===activeFilter&&!t.done);
  else list=list.filter(t=>!t.done).concat(todos.filter(t=>t.done));
  document.getElementById('full-todo').innerHTML=list.length===0
    ?`<div style="font-size:12px;color:var(--t3);text-align:center;padding:24px 0">Nothing here!</div>`
    :list.map(t=>{const i=todos.indexOf(t);return`<div class="todo-item ${t.done?'done-item':''}" draggable="true" data-idx="${i}" ondragstart="dragStart(event,${i})" ondragover="dragOver(event)" ondrop="dragDrop(event,${i})" ondragend="dragEnd()"><div class="drag-handle">⠿</div><div class="todo-cb ${t.done?'done':''}" onclick="toggleTodo(${i})">${t.done?'✓':''}</div><div class="todo-info"><div class="todo-name ${t.done?'done':''}">${t.text}</div></div>${priLabel(t.pri)}<button class="del-btn" onclick="deleteTodo(${i})">✕</button></div>`;}).join('');
}

function toggleTodoArchive(){
  todoArchiveOpen=!todoArchiveOpen;
  const panel=document.getElementById('todo-archive-panel');
  panel.style.display=todoArchiveOpen?'block':'none';
  if(todoArchiveOpen) renderTodoArchive();
}

function renderTodoArchive(){
  document.getElementById('todo-archive-days').innerHTML=archiveDays.map((day,di)=>{
    const pct=Math.round(day.doneCount/day.total*100);
    let dotColor=pct===100?GREEN:pct>=50?YELLOW:O;
    const isOpen=openArchiveDay===di;
    return`<div>
      <div class="day-row ${isOpen?'open':''}" onclick="toggleArchiveDay(${di})">
        <div class="day-date">${day.label}</div>
        <div class="day-score" style="color:${dotColor}">${day.doneCount}/${day.total} done</div>
        <div class="day-dot" style="background:${dotColor}"></div>
        <div class="chevron ${isOpen?'open':''}">▶</div>
      </div>
      ${isOpen?`<div class="day-tasks">${day.tasks.map(t=>`<div class="day-task-row"><div class="day-task-cb ${t.done?'done':'undone'}">${t.done?'✓':'✕'}</div><span style="color:${t.done?'var(--t2)':'var(--t1)'};${t.done?'text-decoration:line-through':''}">${t.text}</span></div>`).join('')}</div>`:''}
    </div>`;
  }).join('');
}

function toggleArchiveDay(di){
  openArchiveDay=openArchiveDay===di?null:di;
  renderTodoArchive();
}

function setProjTab(view,btn){
  projTabView=view;
  document.querySelectorAll('.ptb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  document.getElementById('proj-active').style.display=view==='active'?'block':'none';
  document.getElementById('proj-archive').style.display=view==='archive'?'block':'none';
  document.getElementById('new-proj-btn').style.display=view==='active'?'':'none';
}
function confirmComplete(i){showModal('Mark project complete?','"'+projects[i].name+'" will move to the Archive. You can review it anytime under the Archive tab.','Yes, complete it',false,()=>completeProject(i));}
function completeProject(i){projects[i].archived=true;projects[i].pct=100;projects[i].done=projects[i].done.map(()=>true);projects[i].archivedDate=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});renderProjects();renderOvProjects();}
function deleteHabit(i){showModal('Delete habit?','"'+habits[i].name+'" and all streak data will be permanently removed.','Delete',true,()=>{habits.splice(i,1);renderAll();});}
function deleteProject(i){showModal('Delete project?','"'+projects[i].name+'" will be permanently removed.','Delete',true,()=>{projects.splice(i,1);renderProjects();renderOvProjects();});}
function deleteTodo(i){showModal('Delete to-do?','"'+todos[i].text+'" will be permanently removed.','Delete',true,()=>{todos.splice(i,1);renderOvTodo();renderCarried();renderFullTodo();});}
function toggleTodo(i){todos[i].done=!todos[i].done;if(todos[i].carried&&todos[i].done)todos[i].carried=false;renderOvTodo();renderCarried();renderFullTodo();}
function toggleForm(){const f=document.getElementById('todo-form');f.style.display=f.style.display==='none'?'block':'none';if(f.style.display==='block')document.getElementById('todo-input').focus();}
function submitTodo(){
  const input=document.getElementById('todo-input');const pri=document.getElementById('todo-pri').value;const text=input.value.trim();
  if(!text)return;todos.unshift({text,pri,done:false,rank:-1,carried:false});todos.forEach((t,i)=>t.rank=i);
  input.value='';document.getElementById('todo-form').style.display='none';renderOvTodo();renderFullTodo();
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement.id==='todo-input')submitTodo();if(e.key==='Escape')closeModal();});
function setFilter(f,btn){activeFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderFullTodo();}
function dragStart(e,i){dragSrcIdx=i;setTimeout(()=>{const el=document.querySelector(`[data-idx="${i}"]`);if(el)el.classList.add('dragging');},0);}
function dragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function dragDrop(e,ti){e.preventDefault();document.querySelectorAll('.todo-item').forEach(el=>el.classList.remove('drag-over'));if(dragSrcIdx===null||dragSrcIdx===ti)return;const sr=todos[dragSrcIdx].rank;todos[dragSrcIdx].rank=todos[ti].rank;todos[ti].rank=sr;dragSrcIdx=null;renderFullTodo();renderOvTodo();}
function dragEnd(){document.querySelectorAll('.todo-item').forEach(el=>{el.classList.remove('dragging');el.classList.remove('drag-over');});}
function toggleH(i){const c={pending:'done',done:'missed',missed:'pending'};habits[i].status=c[habits[i].status];if(habits[i].status==='done'&&habits[i].streak===0)habits[i].streak=1;renderAll();}
function setRating(i,r){habits[i].rating=r;if(habits[i].status==='pending')habits[i].status='done';renderAll();}
function useFreeze(i){if(habits[i].freezes>0&&habits[i].status==='missed'){habits[i].freezes--;habits[i].status='pending';renderAll();}}
function toggleTask(pi,ti){projects[pi].done[ti]=!projects[pi].done[ti];const done=projects[pi].done.filter(Boolean).length;projects[pi].pct=Math.round(done/projects[pi].tasks.length*100);renderProjects();}
function nav(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));document.getElementById('v-'+id).classList.add('on');['overview','habits','projects','todo'].forEach((v,idx)=>{if(v===id)document.querySelectorAll('.nb')[idx].classList.add('on');});}
function tick(){const n=new Date();document.getElementById('clk').textContent=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][n.getDay()]+' '+n.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})+' · '+n.toTimeString().slice(0,8);}
function renderAll(){renderScores();renderAlert();renderOvHabits();renderOvProjects();renderOvTodo();renderMissed();renderFullHabits();renderProjects();renderCarried();renderFullTodo();}
renderAll();renderHeatmap();tick();setInterval(tick,1000);
</script>
